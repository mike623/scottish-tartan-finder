name: Incremental crawl and redeploy

# Delta sync: pulls the Register's "What's New" feed, detail-fetches only new
# refs (capped), commits data/tartans-index.json if it changed, then rebuilds
# and deploys Pages in the same job (a GITHUB_TOKEN commit would not re-trigger
# deploy.yml on its own).

on:
  schedule:
    - cron: '17 4 * * 1'   # weekly, Monday 04:17 UTC (off-peak, polite)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Discovery mode'
        type: choice
        default: whatsNew
        options: [whatsNew, az]
      max:
        description: 'Max new detail fetches this run'
        default: '25'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  crawl-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Incremental crawl
        run: npm run crawl:sync -- --mode "${{ inputs.mode || 'whatsNew' }}" --max "${{ inputs.max || '25' }}"
      - name: Commit data if changed
        run: |
          git config user.name  "tartan-crawler[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tartans-index.json
          if git diff --cached --quiet; then
            echo "No new tartans."
          else
            git commit -m "chore(data): incremental crawl $(date -u +%F)"
            git push
          fi
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: crawl-deploy
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
