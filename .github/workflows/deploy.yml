name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build   # builds apps/web from committed data/tartans-index.json (no live crawl in CI)
        env:
          # Set repo variable IMAGE_ORIGIN to the deployed worker URL
          # (Settings → Secrets and variables → Actions → Variables), e.g.
          # https://tartan-img.<subdomain>.workers.dev. Unset → images hit gov.uk directly.
          PUBLIC_IMAGE_ORIGIN: ${{ vars.IMAGE_ORIGIN }}
          # Set repo variable CF_BEACON_TOKEN to the Cloudflare Web Analytics
          # beacon token (dash.cloudflare.com → Web Analytics → your site).
          # Unset → no analytics script emitted.
          CF_BEACON_TOKEN: ${{ vars.CF_BEACON_TOKEN }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
