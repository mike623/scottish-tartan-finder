name: Deploy Astro site to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build   # builds apps/web from committed data/tartans-index.json (no live crawl in CI)
        env:
          # Repo variable IMAGE_ORIGIN → deployed image worker URL, e.g.
          # https://tartan-img.<subdomain>.workers.dev. Unset → images hit gov.uk directly.
          PUBLIC_IMAGE_ORIGIN: ${{ vars.IMAGE_ORIGIN }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}   # scoped: Account → Cloudflare Pages → Edit
          command: pages deploy apps/web/dist --project-name scottish-tartan-finder --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: d0e1f65bab572b7611b2e8f6992caddb
